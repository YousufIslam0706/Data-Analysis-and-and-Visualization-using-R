# Load necessary libraries
library(ggplot2)
library(tidyr)
library(dplyr)

# Read the data from the single CSV file (which contains both plant data and SD values)
data <- read.csv(file.choose())  # Choose the CSV file with both the plant data and SD values

# Reshape the data into long format for ggplot
data_long <- data %>%
  gather(key = "Variable", value = "Value", Stomatal_Conductance:Carbon_Assimilation)

# Combine the SD values into a single vector (192 SD values for 192 rows)
# Assuming the SD columns are named SD_Stomatal_Conductance, SD_Transpiration, and SD_Carbon_Assimilation
sd_values <- c(data$SD_Stomatal_Conductance, data$SD_Transpiration, data$SD_Carbon_Assimilation)

# Add the SD values to the reshaped data
data_long$SD <- sd_values

# Create the plot with error bars for SD
ggplot(data_long, aes(x = Time, y = Value, color = Variety, group = Variety)) +
  geom_line() +
  geom_point(size = 3) +  # Add points to the plot
  geom_errorbar(aes(ymin = Value - SD, ymax = Value + SD), width = 0.2) +  # Add error bars for SD (±1 SD)
  facet_wrap(~ Condition + Variable, scales = "free_y") +
  labs(x = "Time (Days)", y = "Measurement Value", 
       title = "Comparison of Various Plant Traits Over Time with Standard Deviation") +
  theme_minimal() +
  theme(legend.position = "top") +
  scale_color_manual(values = c("blue", "red", "green", "purple")) +  # Adjust colors as needed
  theme(strip.text = element_text(size = 12))  # Customize the facet labels size
